worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;

    # Allow large request bodies for GNN inference with many nodes
    client_max_body_size 100M;

    upstream triton {
        server 127.0.0.1:8000;
    }

    server {
        listen 8080;

        # SageMaker health check
        location /ping {
            proxy_pass http://triton/v2/health/ready;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # SageMaker inference endpoint
        location /invocations {
            proxy_pass http://triton/v2/models/prediction_and_shapley/infer;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Content-Type application/json;

            # Increase timeouts for large inference requests
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
        }

        # Pass through all other Triton endpoints
        location / {
            proxy_pass http://triton;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
